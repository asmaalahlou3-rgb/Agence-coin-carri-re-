<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Carrière | Immobilier d'Entreprise au Maroc</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-blue': '#0B192C',
                        'brand-gold': '#D4AF37',
                        'brand-emerald': '#093A3E'
                    },
                    fontFamily: {
                        'sans': ['Montserrat', 'sans-serif'],
                        'serif': ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans bg-white text-gray-800">

    <header class="bg-brand-blue text-white sticky top-0 z-50 shadow-md" x-data="{ open: false }">
        <div class="max-w-7xl mx-auto px-6 lg:px-8 flex justify-between items-center h-20">
            <div class="font-serif text-2xl font-bold text-brand-gold">
                Coin Carrière
            </div>
            
            <nav class="hidden md:flex space-x-8 text-sm uppercase font-semibold tracking-wider items-center">
                <a href="#accueil" class="hover:text-brand-gold transition">Accueil</a>
                <a href="#approche" class="hover:text-brand-gold transition">Notre Approche</a>
                <a href="#villes" class="hover:text-brand-gold transition">Nos Secteurs</a>
                <a href="#contact" class="bg-brand-gold text-brand-blue px-5 py-2 rounded-sm hover:bg-white hover:text-brand-blue transition">Contact</a>
            </nav>

            <div class="md:hidden">
                <button @click="open = !open" class="text-white focus:outline-none">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path x-show="!open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        <path x-show="open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l18 18"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div x-show="open" @click.away="open = false" class="md:hidden bg-brand-blue border-t border-gray-700">
            <div class="px-4 pt-2 pb-4 space-y-1 text-center">
                <a href="#accueil" class="block px-3 py-2 text-white hover:text-brand-gold">Accueil</a>
                <a href="#approche" class="block px-3 py-2 text-white hover:text-brand-gold">Notre Approche</a>
                <a href="#villes" class="block px-3 py-2 text-white hover:text-brand-gold">Nos Secteurs</a>
                <a href="#contact" class="block px-3 py-2 bg-brand-gold text-brand-blue font-bold">Contact</a>
            </div>
        </div>
    </header>

    <section id="accueil" class="bg-brand-blue text-white py-24 lg:py-32 relative overflow-hidden">
        <div class="absolute inset-0 opacity-5">
            <div class="absolute inset-0 bg-repeat" style="background-image: url('https://www.transparenttextures.com/patterns/cubes.png');"></div>
        </div>
        
        <div class="max-w-7xl mx-auto px-6 lg:px-8 text-center relative z-10">
            <span class="text-brand-gold uppercase tracking-widest font-semibold text-sm">B2B & Immobilier d'Affaires</span>
