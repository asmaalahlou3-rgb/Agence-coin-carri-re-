<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Carrière | Immobilier d'Entreprise</title>
    <style>
        /* Styles de base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
        }

        /* En-tête pour le Logo */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 50px; /* Espace autour du logo */
            z-index: 2; /* Pour qu'il soit par-dessus la vidéo et l'overlay */
            display: flex;
            align-items: center;
        }

        .logo {
            height: 60px; /* Taille du logo (ajustable) */
            width: auto;
        }

        /* Conteneur Hero avec Vidéo */
        .hero-section {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* La Vidéo en Arrière-plan */
        .video-background {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            transform: translate(-50%, -50%);
            filter: grayscale(100%) brightness(50%); /* Rend la vidéo plus sombre et pro */
        }

        /* Overlay Émeraude pour le style luxe */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(4, 43, 31, 0.7) 0%, rgba(0, 0, 0, 0.8) 100%);
            z-index: -1;
        }

        /* Contenu Texte */
        .content {
            text-align: center;
            padding: 0 20px;
            z-index: 1;
        }

        .content h1 {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            background: linear-gradient(to right, #d4af37, #fcf6ba, #b8860b); /* Dégradé Or */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .content p {
            font-size: 1.5rem;
            color: #e0e0e0;
            margin-bottom: 40px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Bouton Or / Gold */
        .btn-gold {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #000;
            background: linear-gradient(45deg, #d4af37, #fcf6ba);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: inline-block;
            text-transform: uppercase;
        }

        .btn-gold:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
        }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .header { padding: 15px 20px; } /* Moins d'espace sur mobile */
            .logo { height: 40px; } /* Logo plus petit sur mobile */
            .content h1 { font-size: 2.5rem; }
            .content p { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <header class="header">
        <img src="logo.png" alt="Logo Coin Carrière" class="logo">
    </header>

    <section class="hero-section">
        <video autoplay muted loop playsinline class="video-background">
            <source src="oincarrière ouvre les portes(1).mp4" type="video/mp4">
            Votre navigateur ne supporte pas la vidéo.
        </video>

        <div class="overlay"></div>

        <div class="content">
            <h1>Coin Carrière</h1>
            <p>Solutions Immobilières Stratégiques pour Entreprises Visionnaires</p>
            <a href="#contact" class="btn-gold">Découvrir nos opportunités</a>
        </div>
    </section>

</body>
</html>
